version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sql-study-postgres
    environment:
      POSTGRES_USER: study_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: study_sql
      # 日本語対応
      LANG: ja_JP.UTF-8
      LC_ALL: ja_JP.UTF-8
    ports:
      - "5432:5432"
    volumes:
      # データの永続化
      - postgres_data:/var/lib/postgresql/data
      # 初期化スクリプト
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_user -d study_sql"]
      interval: 10s
      timeout: 5s
      retries: 5

  # オプション: pgAdmin（GUIでデータベース管理）
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sql-study-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
